name: Deploy to Xserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write deploy revision marker
        run: |
          mkdir -p bootstrap/cache
          echo "${{ github.sha }}" > bootstrap/cache/deploy_revision

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.XSERVER_SSH_KEY }}

      - name: Add host key
        run: |
          set -eo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "${{ secrets.XSERVER_HOST }}" ] || [ -z "${{ secrets.XSERVER_PORT }}" ]; then
            echo "::error::GitHub Secrets の XSERVER_HOST または XSERVER_PORT が空です。"
            exit 1
          fi
          if ! timeout 45 ssh-keyscan -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_HOST }}" >> ~/.ssh/known_hosts 2>ssh-keyscan.err; then
            echo "::error::ssh-keyscan に失敗しました。Xserver の SSH 接続元制限・ホスト名・ポート（例: 10022）を確認してください。"
            head -30 ssh-keyscan.err 2>/dev/null || true
            exit 1
          fi

      # migrate 失敗時に復旧できるよう、ファイル同期・migrate より前に必ずDBバックアップを取る。
      # バックアップに失敗した場合はデプロイ自体を中止する。
      - name: Backup production database before deploy
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" \
            "cd '${{ secrets.XSERVER_DEPLOY_PATH }}' && \
             /opt/php-8.3/bin/php artisan backup:database && \
             ls -lt storage/app/database-backups | head -n 4"

      # 定期バックアップ（日次3:15）の有効状態を確認する（読み取りのみ・デプロイは止めない）
      - name: Report scheduled backup status
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" \
            "cd '${{ secrets.XSERVER_DEPLOY_PATH }}' && \
             (grep -E '^BACKUP_DATABASE_SCHEDULE_ENABLED=' .env || echo 'BACKUP_DATABASE_SCHEDULE_ENABLED: 未設定（既定 false = 定期バックアップ無効）') ; \
             (crontab -l 2>/dev/null | grep -F 'schedule:run' && echo 'cron: schedule:run 登録済み' || echo 'cron: schedule:run 未登録（定期バックアップは動きません）')" || true

      - name: Sync files to Xserver (primary)
        run: |
          rsync -az --checksum \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude "storage/logs/*" \
            -e "ssh -p ${{ secrets.XSERVER_PORT }}" \
            ./ "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${{ secrets.XSERVER_DEPLOY_PATH }}/"

      - name: Resolve staging Laravel root on server
        id: staging
        run: |
          set -eo pipefail
          STAGE_PATH=$(ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" bash -s <<'REMOTE'
          set -euo pipefail
          PRIMARY='${{ secrets.XSERVER_DEPLOY_PATH }}'
          is_laravel_root() {
            local d="$1"
            [ -f "$d/artisan" ] && [ -f "$d/bootstrap/app.php" ]
          }
          has_stage_public() {
            local d="$1"
            [ -f "$d/stage/index.php" ]
          }
          PARENT="$(dirname "$PRIMARY")"
          HOME_DIR="${HOME:-}"
          CANDIDATES=()
          if [ -n "$HOME_DIR" ]; then
            CANDIDATES+=(
              "$HOME_DIR/nakatsuka.online/public_html"
              "$HOME_DIR/domains/nakatsuka.online/public_html"
            )
          fi
          CANDIDATES+=(
            "$PARENT/nakatsuka.online/public_html"
            "$PARENT/public_html"
          )
          for cand in "${CANDIDATES[@]}"; do
            if is_laravel_root "$cand" && has_stage_public "$cand"; then
              echo "$cand"
              exit 0
            fi
          done
          # primary がステージング本体の場合（stage サブディレクトリ運用）
          if is_laravel_root "$PRIMARY" && has_stage_public "$PRIMARY"; then
            echo "$PRIMARY"
            exit 0
          fi
          exit 1
          REMOTE
          ) || true
          if [ -n "${STAGE_PATH:-}" ]; then
            echo "path=${STAGE_PATH}" >> "$GITHUB_OUTPUT"
            echo "Staging Laravel root: ${STAGE_PATH}"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "::warning::ステージング用ディレクトリを自動検出できませんでした（stage.nakatsuka.online は未更新の可能性があります）"
          fi

      - name: Sync files to Xserver (staging)
        if: steps.staging.outputs.path != ''
        run: |
          STAGE_PATH='${{ steps.staging.outputs.path }}'
          rsync -az --checksum \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude "storage/logs/*" \
            -e "ssh -p ${{ secrets.XSERVER_PORT }}" \
            ./ "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${STAGE_PATH}/"
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" \
            "cd '${STAGE_PATH}' && \
             if [ -d public ] && [ -d stage ]; then rsync -a public/ stage/; fi"

      - name: Run migrate and Laravel clear commands (primary)
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" \
            "cd '${{ secrets.XSERVER_DEPLOY_PATH }}' && \
             if [ -d public ] && [ -d stage ]; then rsync -a public/ stage/; fi && \
             /opt/php-8.3/bin/php artisan migrate --no-interaction --force && \
             /opt/php-8.3/bin/php artisan view:clear && \
             /opt/php-8.3/bin/php artisan optimize:clear && \
             /opt/php-8.3/bin/php -r 'if (function_exists(\"opcache_reset\")) { opcache_reset(); }' && \
             test -f resources/views/top/attendance.blade.php && grep -q 'absence_active' resources/views/top/attendance.blade.php"

      # 日次バックアップ（03:15）を有効化。本番 .env のみ更新（rsync 対象外）。
      - name: Enable scheduled database backup (production .env)
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" bash -s <<REMOTE
          set -euo pipefail
          cd '${{ secrets.XSERVER_DEPLOY_PATH }}'
          if grep -q '^BACKUP_DATABASE_SCHEDULE_ENABLED=' .env; then
            sed -i 's/^BACKUP_DATABASE_SCHEDULE_ENABLED=.*/BACKUP_DATABASE_SCHEDULE_ENABLED=true/' .env
          else
            printf '\n# 日次 DB バックアップ（毎日 03:15）\nBACKUP_DATABASE_SCHEDULE_ENABLED=true\n' >> .env
          fi
          /opt/php-8.3/bin/php artisan config:clear
          grep '^BACKUP_DATABASE_SCHEDULE_ENABLED=' .env
          REMOTE

      # Laravel スケジューラ用 cron。未登録なら追加（Xserver で crontab が使えない場合はパネル手動設定）。
      - name: Install schedule:run cron if missing (production)
        continue-on-error: true
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" bash -s <<REMOTE
          set -euo pipefail
          CRON_LINE='* * * * * cd "${{ secrets.XSERVER_DEPLOY_PATH }}" && /opt/php-8.3/bin/php artisan schedule:run >> "${{ secrets.XSERVER_DEPLOY_PATH }}/storage/logs/schedule-run.log" 2>&1'
          if crontab -l 2>/dev/null | grep -Fq 'artisan schedule:run'; then
            echo 'cron: schedule:run は既に登録済み'
            crontab -l 2>/dev/null | grep 'schedule:run' || true
          else
            (crontab -l 2>/dev/null; echo "\${CRON_LINE}") | crontab -
            echo 'cron: schedule:run を追加しました'
            crontab -l 2>/dev/null | grep 'schedule:run' || true
          fi
          REMOTE

      - name: Verify backup setup (production)
        continue-on-error: true
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" \
            "cd '${{ secrets.XSERVER_DEPLOY_PATH }}' && /opt/php-8.3/bin/php artisan backup:doctor"

      - name: Run migrate and Laravel clear commands (staging)
        if: steps.staging.outputs.path != ''
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" \
            "cd '${{ steps.staging.outputs.path }}' && \
             /opt/php-8.3/bin/php artisan migrate --no-interaction --force && \
             /opt/php-8.3/bin/php artisan view:clear && \
             /opt/php-8.3/bin/php artisan optimize:clear && \
             test -f resources/views/top/attendance.blade.php && grep -q 'absence_active' resources/views/top/attendance.blade.php && \
             /opt/php-8.3/bin/php -r 'if (function_exists(\"opcache_reset\")) { opcache_reset(); }' && \
             echo 'staging deploy ok'"
